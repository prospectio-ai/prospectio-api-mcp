name: "CD - Prospectio API MCP"

on:
  pull_request:
    types: [closed]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

jobs:
  build-and-push:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/deploy'))
    runs-on: ubuntu-latest

    steps:
      # ── 1. Resolve the SHA to deploy ───────────────────────────────
      - name: Get deploy SHA
        id: sha
        uses: actions/github-script@v7
        with:
          script: |
            let sha;
            if (context.eventName === 'pull_request') {
              sha = context.payload.pull_request.merge_commit_sha;
              core.info(`Merged PR – using merge commit SHA: ${sha}`);
            } else {
              const pr = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.issue.number,
              });
              if (!pr.data.merged) {
                core.setFailed('PR is not merged – cannot deploy');
                return;
              }
              sha = pr.data.merge_commit_sha;
              core.info(`/deploy comment – using merge commit SHA: ${sha}`);
            }
            core.setOutput('sha', sha);

      # ── 2. React to /deploy comment ────────────────────────────────
      - name: Add rocket reaction
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'rocket',
            });

      # ── 3. Checkout at resolved SHA ────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.sha.outputs.sha }}

      # ── 4. Setup Docker Buildx ─────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 5. Login to DockerHub ──────────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 6. Build for scanning (amd64 only) ────────────────────────
      - name: Build image for scanning
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: kaiohz/prospectio-api-mcp:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Trivy – full report (informational) ────────────────────
      - name: Trivy Image Scan report
        # v0.35.0 - pinned by SHA for supply chain security
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: kaiohz/prospectio-api-mcp:scan
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
          trivy-config: trivy.yaml
          trivy-version: 'v0.69.3'

      # ── 8. Trivy – gate on CRITICAL ───────────────────────────────
      - name: Trivy Image Scan gate
        # v0.35.0 - pinned by SHA for supply chain security
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
        with:
          image-ref: kaiohz/prospectio-api-mcp:scan
          format: table
          severity: CRITICAL
          exit-code: "1"
          trivy-config: trivy.yaml
          trivy-version: 'v0.69.3'

      # ── 9. Build and push multi-platform ──────────────────────────
      - name: Build and push Docker image (multi-platform)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            kaiohz/prospectio-api-mcp:${{ steps.sha.outputs.sha }}
            kaiohz/prospectio-api-mcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 10. Clone Flux repo ────────────────────────────────────────
      - name: Clone Flux repo
        run: |
          git clone https://x-access-token:${{ secrets.FLUX_REPO_TOKEN }}@github.com/prospectio-ai/flux-repo.git flux-repo

      # ── 11. Update deployment manifest ─────────────────────────────
      - name: Update deployment image tag
        run: |
          DEPLOYMENT_FILE="flux-repo/dev/prospectio/prospectio-api-mcp/deployment.yaml"
          if [ -f "$DEPLOYMENT_FILE" ]; then
            sed -i "s|image: kaiohz/prospectio-api-mcp:.*|image: kaiohz/prospectio-api-mcp:${{ steps.sha.outputs.sha }}|" "$DEPLOYMENT_FILE"
          else
            echo "Error: Deployment file not found at $DEPLOYMENT_FILE"
            exit 1
          fi

      # ── 12. Commit and push to Flux repo ───────────────────────────
      - name: Commit and push to Flux repo
        run: |
          cd flux-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dev/prospectio/prospectio-api-mcp/deployment.yaml
          git commit -m "deploy: prospectio-api-mcp@${{ steps.sha.outputs.sha }}"
          git push origin main
